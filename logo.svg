<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#00ff88" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  
  <!-- Atom orbits -->
  <g fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.6">
    <ellipse cx="256" cy="256" rx="180" ry="60" transform="rotate(0 256 256)"/>
    <ellipse cx="256" cy="256" rx="180" ry="60" transform="rotate(60 256 256)"/>
    <ellipse cx="256" cy="256" rx="180" ry="60" transform="rotate(120 256 256)"/>
  </g>
  
  <!-- Center nucleus -->
  <circle cx="256" cy="256" r="40" fill="url(#glow)" filter="url(#glowFilter)"/>
  
  <!-- H letter -->
  <text x="256" y="280" font-family="Arial Black, sans-serif" font-size="80" 
        font-weight="900" fill="#0a0a0f" text-anchor="middle" dominant-baseline="middle">H</text>
  
  <!-- USB icon -->
  <g transform="translate(380, 380)" fill="none" stroke="#00ff88" stroke-width="4">
    <rect x="0" y="0" width="80" height="40" rx="8"/>
    <line x1="20" y1="8" x2="20" y2="16"/>
    <line x1="40" y1="8" x2="40" y2="16"/>
    <line x1="60" y1="8" x2="60" y2="16"/>
    <rect x="25" y="40" width="30" height="15" rx="3"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="28" 
        font-weight="bold" fill="url(#glow)" text-anchor="middle" letter-spacing="4">ARCHEHEISENBERG</text>
</svg>